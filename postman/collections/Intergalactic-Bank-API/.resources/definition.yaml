$kind: collection
name: Intergalactic Bank API
description: A banking API for the Intergalactic Bank. Supports account
  management and transactions. Auth via `x-api-key` header.
auth:
  type: apikey
  credentials:
    key: x-api-key
    value: "{{apiKey}}"
    in: header
variables:
  baseUrl: https://template.postman-echo.com
  apiKey: "1234"
  accountId: "1"
  transactionId: "1"
